});

document.addEventListener('keydown', function(event) {
    if ((event.ctrlKey === true || event.metaKey === true)

            || event.keyCode === 187 || event.keyCode === 189)) {

}, false);

document.addEventListener("DOMContentLoaded", function() {
    var rollingIcon = document.querySelector(".rolling-icon");
    var titleBackgrounds = document.querySelectorAll(".title-background1, .title-background2, .title-background3");
    
    // 添加点击事件监听器
    rollingIcon.addEventListener("click", function() {
        // 遍历所有标题背景元素
        titleBackgrounds.forEach(function(element, index) {
            // 检查当前元素的opacity属性是否为1
            if (window.getComputedStyle(element).getPropertyValue("opacity") === "1") {
                // 找到当前显示的元素，构建锚点id
                var anchorId = "anchor-" + (index + 1);
                // 使用锚点id滚动到相应的位置
                var targetSection = document.getElementById(anchorId);
                targetSection.scrollIntoView({ behavior: "smooth" });
            }
        });
    });
});

if (targetElementRect.left <= 0 && distanceOverLeftBoundary <= 1000 && isScrollReallyEnabled)  {
        console.log("banned");

if (frozenSection) {

    // 横向移动页面
    window.scrollBy({

    });
}
